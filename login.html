<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildX – Login</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .center-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 44px 40px;
            backdrop-filter: blur(24px);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--amber), var(--purple), var(--cyan));
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .logo-wrap {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--amber), #f97316);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.45);
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        .login-logo h2 {
            font-size: 1.7rem;
            margin-bottom: 6px;
        }

        .login-logo p {
            font-size: 0.88rem;
            color: var(--gray-400);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            display: none;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
        }

        .divider-or::before,
        .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.05);
        }

        .divider-or span {
            font-size: 0.78rem;
            color: var(--gray-500);
            font-weight: 600;
        }

        footer {
            background: var(--navy-2);
            border-top: 1px solid var(--navy-4);
            padding: 18px 40px;
            text-align: center;
        }

        .footer-copy {
            color: var(--gray-600);
            font-size: 0.8rem;
        }

        .footer-copy span {
            color: var(--amber);
            font-weight: 800;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }

            .login-logo h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">
            <div class="logo-icon">⚒️</div>
            Build<span>X</span>
        </a>
        <div class="navbar-actions">
            <span class="text-muted" style="font-size:0.85rem;">New here?</span>
            <a href="register.html" class="btn btn-primary btn-sm">Create Account</a>
        </div>
    </nav>

    <div class="center-wrap">
        <button id="themeToggle" onclick="toggleTheme()"
            style="position:fixed; top:20px; right:20px; z-index:100; background:var(--navy-3); border:1px solid var(--glass-border); padding:8px; border-radius:50%; width:40px; height:40px; cursor:pointer;">🌓</button>
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-wrap">X</div>
                <h2>Welcome <span class="gradient-text">back!</span></h2>
                <p>Login to your BuildX account</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm" onsubmit="doLogin(event)">
                <div class="form-group">
                    <label class="form-label">📧 Email Address</label>
                    <input class="form-input" id="lEmail" type="email" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label class="form-label">🔒 Password</label>
                    <input class="form-input" id="lPass" type="password" placeholder="Your password" required />
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn"
                    style="margin-top:6px; padding:14px; font-size:0.95rem;">
                    Login to Account →
                </button>
            </form>

            <div class="divider-or"><span>OR</span></div>

            <a href="register.html" class="btn btn-ghost btn-full" style="padding:13px;">
                🚀 Create a Free Account
            </a>

            <p class="text-center text-muted mt-4" style="font-size:0.82rem;">
                <a href="app.html" style="color:var(--amber);">Browse marketplace without login →</a>
            </p>
        </div>
    </div>

    <footer>
        <p class="section-sub">Welcome back to BuildX.</p>
        <p class="footer-copy">© 2026 <span>BuildX</span> · All rights reserved</p>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Theme init
        const savedTheme = localStorage.getItem('ch_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        window.addEventListener('DOMContentLoaded', () => {
            const tb = document.getElementById('themeToggle');
            if (tb) tb.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        });

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            document.getElementById('themeToggle').textContent = target === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('ch_theme', target);
        }

        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Logging in...'; btn.disabled = true;
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('lEmail').value,
                        password: document.getElementById('lPass').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed.');
                toast('✅ Welcome back, ' + data.user.name + '!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.textContent = 'Login to Account →'; btn.disabled = false;
            }
        }

        function toast(msg, type = '') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.innerHTML = `<span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3200);
        }
    </script>
</body>

</html>
