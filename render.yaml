services:
  - type: web
    name: buildx-marketplace
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        value: "" # User should add their MongoDB Atlas URI here for persistence
